<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>Chessboard Vocal Trainer</title>
  <style>
    :root {
      /* Highlight casella corrente */
      --accent: #d73535;
      --accent-glow: rgba(215, 53, 53, 0.50);

      /* Scacchiera (neutra, per far risaltare rosso e blu) */
      --sq-light: #ece9e1;
      --sq-light-text: #3a3a3a;
      --sq-dark: #8b877e;
      --sq-dark-text: #f7f7f5;
      --board-frame: #2b2b2b;

      /* Selezione area */
      --sel-border: #1f7aec;
      --sel-fill: rgba(31, 122, 236, 0.20);
      --sel-glow: rgba(31, 122, 236, 0.45);

      /* Pagina */
      --bg: #f4f5f7;
      --fg: #1c1f24;
      --muted: #5b6068;
      --card-bg: #ffffff;
      --card-border: #e2e4e8;
      --btn-bg: #ffffff;
      --btn-border: #cfd3da;
      --btn-fg: #2a2e35;
      --btn-active-bg: #1c1f24;
      --btn-active-fg: #ffffff;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #14161a;
        --fg: #eceef2;
        --muted: #9aa0aa;
        --card-bg: #1d2026;
        --card-border: #2c3038;
        --btn-bg: #22262d;
        --btn-border: #363b44;
        --btn-fg: #e6e8ec;
        --btn-active-bg: #eceef2;
        --btn-active-fg: #14161a;
        --board-frame: #0c0d10;
      }
    }

    * { box-sizing: border-box; }
    html, body {
      height: 100%;
      margin: 0;
      background: var(--bg);
      color: var(--fg);
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
      -webkit-text-size-adjust: 100%;
    }
    .page {
      min-height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      padding: 16px 16px calc(16px + env(safe-area-inset-bottom));
    }
    h1 {
      margin: 4px 0 0;
      font-size: clamp(17px, 2.4vw, 26px);
      font-weight: 750;
      letter-spacing: -0.01em;
      text-align: center;
    }

    /* Card di stato */
    .status {
      width: min(92vw, 80vh);
      max-width: 520px;
      min-height: 64px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 12px 16px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 14px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.04);
      text-align: center;
      font-size: clamp(16px, 2.1vw, 22px);
      font-weight: 600;
      line-height: 1.35;
    }
    .status b { font-weight: 800; }
    .status .coord {
      font-variant-numeric: tabular-nums;
      font-weight: 850;
      letter-spacing: 0.02em;
    }
    .chip {
      flex: 0 0 auto;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 2px solid rgba(128,128,128,0.5);
    }
    .chip.bianco { background: #f2f2ee; }
    .chip.nero   { background: #2a2a2a; }

    /* Controlli */
    .controls {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
    }
    .btn {
      appearance: none;
      border: 1px solid var(--btn-border);
      background: var(--btn-bg);
      color: var(--btn-fg);
      padding: 9px 14px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 650;
      cursor: pointer;
      transition: background .12s ease, transform .06s ease, border-color .12s ease;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:hover { border-color: var(--muted); }
    .btn:active { transform: translateY(1px); }
    .btn.on {
      background: var(--btn-active-bg);
      color: var(--btn-active-fg);
      border-color: var(--btn-active-bg);
    }
    .btn:focus-visible { outline: 3px solid var(--sel-border); outline-offset: 2px; }
    #clearSel { display: none; }
    #clearSel.visible { display: inline-block; }

    .board-wrap {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .board {
      --side: min(92vw, 70vh);
      width: var(--side);
      height: var(--side);
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      grid-template-rows: repeat(8, 1fr);
      border: 4px solid var(--board-frame);
      background: var(--board-frame);
      box-shadow: 0 6px 22px rgba(0,0,0,0.18);
      border-radius: 8px;
      position: relative;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: none; /* il drag non scrolla/zooma; il tap resta valido */
    }
    .board:focus-visible { outline: 3px solid var(--sel-border); outline-offset: 3px; }

    .square {
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      font-weight: 700;
      font-size: clamp(9px, 2vw, 15px);
      position: relative;
      z-index: 0;
      transition: color .15s ease;
    }
    .white { background: var(--sq-light); color: var(--sq-light-text); }
    .black { background: var(--sq-dark);  color: var(--sq-dark-text); }
    .board.hide-labels .square { color: transparent; }

    /* Overlay blu: area selezionata (cumulativa) */
    .in-area::after,
    .candidate::after {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--sel-fill);
      box-shadow: inset 0 0 0 3px var(--sel-border);
      pointer-events: none;
      z-index: 1;
    }

    /* Highlight casella corrente: sempre sopra tutto */
    .highlight { z-index: 999; }
    .highlight::before {
      content: '';
      position: absolute;
      inset: 0;
      box-shadow: inset 0 0 0 4px var(--accent);
      pointer-events: none;
      z-index: 1000;
      animation: hlPulse 1.1s ease-in-out infinite;
    }
    .highlight::after {
      content: '';
      position: absolute;
      inset: -2px;
      box-shadow: 0 0 12px 4px var(--accent-glow);
      border-radius: 4px;
      pointer-events: none;
      z-index: 1001;
    }
    @keyframes hlPulse {
      0%, 100% { box-shadow: inset 0 0 0 4px var(--accent); }
      50%      { box-shadow: inset 0 0 0 6px var(--accent); }
    }
    @media (prefers-reduced-motion: reduce) {
      .highlight::before { animation: none; }
    }

    /* Rettangolo di selezione (solo durante il drag) */
    .sel-box {
      position: absolute;
      pointer-events: none;
      display: none;
      z-index: 1500;
      border: 3px dashed var(--sel-border);
      background: rgba(31, 122, 236, 0.10);
      box-shadow: 0 0 0 2px var(--sel-glow), 0 0 16px var(--sel-glow);
      border-radius: 4px;
      animation: selPulse .9s ease-in-out infinite;
    }
    .sel-box.active { display: block; }
    @keyframes selPulse {
      0%, 100% { box-shadow: 0 0 0 2px var(--sel-glow), 0 0 10px var(--sel-glow); }
      50%      { box-shadow: 0 0 0 4px var(--sel-glow), 0 0 22px var(--sel-glow); }
    }

    .hint {
      font-size: clamp(12px, 1.6vw, 15px);
      color: var(--muted);
      text-align: center;
      max-width: min(92vw, 520px);
      line-height: 1.4;
    }
    .pool { font-weight: 650; color: var(--fg); }

    @media (min-width: 900px) {
      .page { padding-top: 24px; }
      .board { --side: min(66vh, 66vw); }
    }
  </style>
</head>
<body>
  <div class="page">
    <h1>Chessboard Vocal Trainer</h1>

    <div class="status" id="status" role="status" aria-live="polite"></div>

    <div class="controls">
      <button class="btn on" id="muteBtn" aria-pressed="true">🔈 Voce: on</button>
      <button class="btn" id="labelsBtn" aria-pressed="false">Nascondi etichette</button>
      <button class="btn" id="clearSel">Azzera selezione</button>
    </div>

    <div class="board-wrap">
      <div class="board" id="board" aria-label="Scacchiera: tocca per avanzare, trascina per selezionare un'area" role="button" tabindex="0">
        <div class="sel-box" id="selBox"></div>
      </div>
    </div>

    <div class="hint" id="hint"></div>
  </div>

  <script>
    'use strict';

    const files = ['a','b','c','d','e','f','g','h'];
    const ranks = [1,2,3,4,5,6,7,8];

    const boardEl    = document.getElementById('board');
    const statusEl   = document.getElementById('status');
    const selBoxEl   = document.getElementById('selBox');
    const hintEl     = document.getElementById('hint');
    const clearSelBtn= document.getElementById('clearSel');
    const muteBtn    = document.getElementById('muteBtn');
    const labelsBtn  = document.getElementById('labelsBtn');

    // a1 è una casella scura -> (file + rank) dispari = nero
    function colorFor(fileIndex, rankNumber) {
      return ((fileIndex + rankNumber) % 2 === 1) ? 'nero' : 'bianco';
    }
    function femColor(c) { return c === 'nero' ? 'nera' : 'bianca'; }

    // Costruzione scacchiera (rank 8 in alto)
    const allSquares = [];
    for (let r = 7; r >= 0; r--) {
      for (let f = 0; f < 8; f++) {
        const coord = files[f] + ranks[r];
        const colorName = colorFor(f, ranks[r]);
        const el = document.createElement('div');
        el.className = 'square ' + (colorName === 'nero' ? 'black' : 'white');
        el.textContent = coord;
        boardEl.appendChild(el);
        allSquares.push({ coord, color: colorName, element: el, f, r });
      }
    }

    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    /* ---------- Sintesi vocale ---------- */
    let muted = false;
    let itVoice = null;
    const synth = window.speechSynthesis;

    function loadVoice() {
      if (!synth) return;
      const voices = synth.getVoices();
      itVoice = voices.find(v => v.lang && v.lang.toLowerCase().startsWith('it')) || null;
    }
    if (synth) {
      loadVoice();
      synth.onvoiceschanged = loadVoice;
    }
    function speak(text) {
      if (muted || !synth) return;
      try {
        const u = new SpeechSynthesisUtterance(text);
        u.lang = 'it-IT';
        if (itVoice) u.voice = itVoice;
        synth.cancel();
        synth.speak(u);
      } catch (e) { /* no-op */ }
    }

    /* ---------- Selezione cumulativa ---------- */
    const selectedKeys = new Set();

    function applySelectedVisuals() {
      for (const s of allSquares) {
        s.element.classList.toggle('in-area', selectedKeys.has(s.coord));
      }
      clearSelBtn.classList.toggle('visible', selectedKeys.size > 0);
    }

    /* ---------- Stato quiz ---------- */
    let activeSquares = shuffle(allSquares.slice());
    let index = 0;
    let state = 0; // 0 = mostra coordinata, 1 = rivela colore

    function clearHighlights() {
      for (const s of allSquares) s.element.classList.remove('highlight');
    }

    function setStatus(html) { statusEl.innerHTML = html; }

    function updatePool() {
      const n = activeSquares.length;
      const sel = selectedKeys.size;
      const pool = sel === 0
        ? `Pool: <span class="pool">tutte le 64 caselle</span>`
        : `Pool: <span class="pool">${sel} caselle selezionate</span>`;
      hintEl.innerHTML = `${pool} · Tocca/clic o premi <b>Spazio</b> per avanzare · trascina per selezionare un'area`;
    }

    function rebuildActiveFromSelection() {
      activeSquares = (selectedKeys.size === 0)
        ? allSquares.slice()
        : allSquares.filter(s => selectedKeys.has(s.coord));
      shuffle(activeSquares);
      index = 0;
      state = 0;
      clearHighlights();
      applySelectedVisuals();
      updatePool();
    }

    function step() {
      if (activeSquares.length === 0) {
        setStatus(`Seleziona almeno una casella valida.`);
        return;
      }
      const current = activeSquares[index];

      if (state === 0) {
        clearHighlights();
        setStatus(`📍 Casella <span class="coord">${current.coord}</span> — di che colore è?`);
        speak('Casella ' + current.coord);
        state = 1;
      } else {
        clearHighlights();
        current.element.classList.add('highlight');
        setStatus(
          `<span class="chip ${current.color}"></span>` +
          `<span class="coord">${current.coord}</span> è una casella <b>${femColor(current.color)}</b>`
        );
        speak('Colore ' + current.color);
        state = 0;
        index++;
        if (index >= activeSquares.length) {
          shuffle(activeSquares);
          index = 0;
        }
      }
    }

    /* ---------- Gestione gesti (Pointer Events: mouse + touch unificati) ---------- */
    const DRAG_THRESHOLD = 10; // px: sotto soglia = tap, sopra = selezione
    let pointerId = null;
    let startXY = null;
    let startFR = null;
    let curFR = null;
    let didDrag = false;

    function hitSquareFromPoint(clientX, clientY) {
      const rect = boardEl.getBoundingClientRect();
      const x = clientX - rect.left;
      const y = clientY - rect.top;
      const f = Math.floor((x / rect.width) * 8);
      const rFromTop = Math.floor((y / rect.height) * 8);
      const r = 7 - rFromTop;
      return { f: Math.max(0, Math.min(7, f)), r: Math.max(0, Math.min(7, r)) };
    }

    function updateSelBox(a, b) {
      const rect = boardEl.getBoundingClientRect();
      const tileW = rect.width / 8;
      const tileH = rect.height / 8;
      const fMin = Math.min(a.f, b.f), fMax = Math.max(a.f, b.f);
      const rMin = Math.min(a.r, b.r), rMax = Math.max(a.r, b.r);
      selBoxEl.style.left   = (fMin * tileW) + 'px';
      selBoxEl.style.top    = ((7 - rMax) * tileH) + 'px';
      selBoxEl.style.width  = ((fMax - fMin + 1) * tileW) + 'px';
      selBoxEl.style.height = ((rMax - rMin + 1) * tileH) + 'px';
      selBoxEl.classList.add('active');
    }
    function hideSelBox() { selBoxEl.classList.remove('active'); }

    function markCandidates(a, b) {
      const fMin = Math.min(a.f, b.f), fMax = Math.max(a.f, b.f);
      const rMin = Math.min(a.r, b.r), rMax = Math.max(a.r, b.r);
      for (const s of allSquares) {
        const inside = s.f >= fMin && s.f <= fMax && s.r >= rMin && s.r <= rMax;
        s.element.classList.toggle('candidate', inside);
      }
    }
    function clearCandidates() {
      for (const s of allSquares) s.element.classList.remove('candidate');
    }

    boardEl.addEventListener('pointerdown', (e) => {
      if (e.pointerType === 'mouse' && e.button !== 0) return;
      if (pointerId !== null) return; // un solo puntatore alla volta
      pointerId = e.pointerId;
      startXY = { x: e.clientX, y: e.clientY };
      startFR = hitSquareFromPoint(e.clientX, e.clientY);
      curFR = startFR;
      didDrag = false;
      try { boardEl.setPointerCapture(e.pointerId); } catch (err) {}
    });

    boardEl.addEventListener('pointermove', (e) => {
      if (e.pointerId !== pointerId) return;
      if (!didDrag) {
        const dx = e.clientX - startXY.x;
        const dy = e.clientY - startXY.y;
        if (Math.hypot(dx, dy) < DRAG_THRESHOLD) return;
        didDrag = true; // inizia la selezione
      }
      curFR = hitSquareFromPoint(e.clientX, e.clientY);
      updateSelBox(startFR, curFR);
      markCandidates(startFR, curFR);
    });

    function finishPointer(e, cancelled) {
      if (e.pointerId !== pointerId) return;
      try { boardEl.releasePointerCapture(e.pointerId); } catch (err) {}
      pointerId = null;

      if (cancelled) { hideSelBox(); clearCandidates(); return; }

      if (didDrag) {
        // Finalizza selezione: unione con il set esistente
        const fMin = Math.min(startFR.f, curFR.f), fMax = Math.max(startFR.f, curFR.f);
        const rMin = Math.min(startFR.r, curFR.r), rMax = Math.max(startFR.r, curFR.r);
        for (const s of allSquares) {
          if (s.f >= fMin && s.f <= fMax && s.r >= rMin && s.r <= rMax) {
            selectedKeys.add(s.coord);
          }
        }
        hideSelBox();
        clearCandidates();
        rebuildActiveFromSelection();
        setStatus(`Area aggiornata: <b>${activeSquares.length}</b> caselle nel pool. Tocca per iniziare.`);
      } else {
        // Tap puro -> avanza il quiz
        step();
      }
    }

    boardEl.addEventListener('pointerup', (e) => finishPointer(e, false));
    boardEl.addEventListener('pointercancel', (e) => finishPointer(e, true));

    /* ---------- Tastiera (desktop) ---------- */
    document.addEventListener('keydown', (e) => {
      if (e.code === 'Space' || e.code === 'Enter') {
        // evita doppio avanzamento se il focus è su un bottone
        if (document.activeElement && document.activeElement.classList.contains('btn')) return;
        e.preventDefault();
        step();
      }
    });

    /* ---------- Controlli ---------- */
    clearSelBtn.addEventListener('click', () => {
      selectedKeys.clear();
      hideSelBox();
      clearCandidates();
      rebuildActiveFromSelection();
      setStatus(`Selezione azzerata. Tocca per iniziare.`);
    });

    muteBtn.addEventListener('click', () => {
      muted = !muted;
      if (muted && synth) synth.cancel();
      muteBtn.classList.toggle('on', !muted);
      muteBtn.setAttribute('aria-pressed', String(!muted));
      muteBtn.textContent = muted ? '🔇 Voce: off' : '🔈 Voce: on';
    });

    labelsBtn.addEventListener('click', () => {
      const hidden = boardEl.classList.toggle('hide-labels');
      labelsBtn.classList.toggle('on', hidden);
      labelsBtn.setAttribute('aria-pressed', String(hidden));
      labelsBtn.textContent = hidden ? 'Mostra etichette' : 'Nascondi etichette';
    });

    /* ---------- Avvio ---------- */
    const isTouch = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
    setStatus(isTouch
      ? `Tocca la scacchiera per iniziare 👆`
      : `Premi <b>Spazio</b> o clicca per iniziare ⌨️`);
    updatePool();
  </script>
</body>
</html>
