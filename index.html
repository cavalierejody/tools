<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toolbox</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-200">

    <div class="min-h-screen flex flex-col items-center justify-center p-4">
        
        <header class="text-center mb-12">
            <h1 class="text-4xl md:text-5xl font-bold text-slate-900 dark:text-white mb-3">
                La Mia Toolbox di Strumenti
            </h1>
            <p class="text-lg text-slate-600 dark:text-slate-400 max-w-2xl mx-auto">
                Una raccolta di piccole web app e utility per risolvere problemi specifici.
            </p>
        </header>

        <main class="w-full max-w-4xl">
            <div id="tools-container" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                </div>
        </main>

    </div>

    <script>
        // 1. Definisci qui i tuoi strumenti. Per aggiungerne uno nuovo, basta aggiungere una riga qui sotto.
        const toolsData = [
            {
                file: "backlog-estimator-app.html",
                name: "Backlog Estimator",
                desc: "Uno strumento per stimare rapidamente le tempistiche di un backlog di sviluppo."
            },
            {
                file: "cipher-breaker-app.html",
                name: "Cipher Breaker",
                desc: "Un'utility per analizzare e decifrare semplici codici a sostituzione."
            },
            {
                file: "chessboard-vocal-trainer-app.html",
                name: "Chessboard Vocal Trainer",
                desc: "Un'utility per imparare a visualizzare mentalmente il colore delle caselle della scacchiera a occhi chiusi."
            },
            {
                file: "./black-white-app/index.html",
                name: "Black White App",
                desc: "Un'utility per imparare a visualizzare mentalmente il colore delle caselle della scacchiera a occhi chiusi."
            },
            {
                file: "super-tris-app.html",
                name: "Super Tris",
                desc: "Il gioco del Super Tris."
            },
            {
                file: "whereismycar-app.html",
                name: "WhereIsMyCar",
                desc: "Ritrova la tua auto parcheggiata."
            },
            {
                file: "calm-breath-app.html",
                name: "CalmBreath",
                desc: "Respirazione 4-7-8"
            },
            {
                file: "6min.html",
                name: "6min",
                desc: "Test dei 6 minuti e calcolo delle fasce cardiache e di ritmo per la corsa"
            },
            {
                file: "trixxx.html",
                name: "Trixxx",
                desc: "Il gioco del Trixxx"
            },
            {
                file: "honest-hiking-page.html",
                name: "Honest Hiking",
                desc: "Honest Hiking Press Page"
            }
        ];

        // 2. Funzione per generare il markup HTML di una singola card
        function createCardHTML(tool) {
            return `
                <a href="${tool.file}" class="group block p-6 bg-white dark:bg-slate-800 rounded-xl shadow-md hover:shadow-lg hover:scale-105 transition-all duration-300 ease-in-out border border-slate-200 dark:border-slate-700">
                    <h2 class="text-2xl font-semibold text-slate-900 dark:text-white mb-2">
                        ${tool.name}
                    </h2>
                    <p class="text-slate-600 dark:text-slate-400 mb-4">
                        ${tool.desc}
                    </p>
                    <span class="font-medium text-indigo-600 dark:text-indigo-400 group-hover:underline">
                        Apri lo strumento &rarr;
                    </span>
                </a>
            `;
        }

        // 3. Iniezione del codice nel DOM
        const container = document.getElementById('tools-container');
        container.innerHTML = toolsData.map(createCardHTML).join('');
    </script>

</body>
</html>
