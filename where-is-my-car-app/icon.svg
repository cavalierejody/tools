  <!-- Right window -->
  <path d="M347 265 L329 205 Q326 195 317 195 L299 195 L317 265 Z" fill="#5BB8FF" opacity="0.5"/>

  <!-- Left wheel -->
  <circle cx="163" cy="375" r="42" fill="#1a1a2e"/>
  <circle cx="163" cy="375" r="22" fill="#e0e0e0"/>
  <circle cx="163" cy="375" r="10" fill="#007AFF"/>

  <!-- Right wheel -->
  <circle cx="349" cy="375" r="42" fill="#1a1a2e"/>
  <circle cx="349" cy="375" r="22" fill="#e0e0e0"/>
  <circle cx="349" cy="375" r="10" fill="#007AFF"/>

  <!-- Headlight left -->
