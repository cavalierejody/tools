<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background rounded rect iOS style -->
  <rect width="512" height="512" rx="112" ry="112" fill="#007AFF"/>

  <!-- Car body -->
  <rect x="90" y="270" width="332" height="110" rx="28" fill="white"/>

  <!-- Car roof / cabin -->
